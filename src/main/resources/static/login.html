<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | StudyNest</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- ================= AUTH WRAPPER ================= -->

    <div class="auth-wrapper">
      <div class="card-ui auth-card">
        <!-- ================= HEADER ================= -->

        <div class="text-center mb-4">
          <div class="brand-icon">
            <i class="bi bi-box-arrow-in-right"></i>
          </div>

          <h1 class="navbar-brand m-0">Study<span>Nest</span></h1>

          <p class="text-muted mt-3">
            Login to continue managing your students.
          </p>
        </div>

        <!-- ================= ALERT ================= -->

        <div id="messageBox"></div>

        <!-- ================= FORM ================= -->

        <form onsubmit="loginUser(event)">
          <!-- EMAIL -->

          <div class="mb-3">
            <label class="form-label"> Email Address </label>

            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>

          <!-- PASSWORD -->

          <div class="mb-4">
            <label class="form-label"> Password </label>

            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="showPassword" />

            <label class="form-check-label text-muted" for="showPassword">
              Show Password
            </label>
          </div>

          <!-- BUTTON -->

          <button class="btn btn-primary-custom w-100">Login</button>
        </form>

        <!-- ================= FOOTER ================= -->

        <div class="text-center mt-4">
          <p class="text-muted">
            Don't have an account?

            <a href="register.html" class="text-decoration-none fw-semibold">
              Register
            </a>
          </p>
        </div>
      </div>
    </div>

    <!-- ================= SCRIPTS ================= -->

    <script src="js/api.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/auth.js"></script>

    <script>
      const passwordInput = document.getElementById("password");

      const showPassword = document.getElementById("showPassword");

      showPassword.addEventListener("change", () => {
        if (showPassword.checked) {
          passwordInput.type = "text";
        } else {
          passwordInput.type = "password";
        }
      });
    </script>
  </body>
</html>
