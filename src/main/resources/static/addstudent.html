<!doctype html>

<html lang="en">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Add Student | StudyNest</title>

	<!-- Bootstrap -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Bootstrap Icons -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<!-- Google Fonts -->

	<link
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
		rel="stylesheet">

	<!-- Custom CSS -->

	<link rel="stylesheet" href="css/style.css">

</head>

<body>

	<!-- ================= NAVBAR ================= -->

	<nav class="navbar navbar-expand-lg">

		<div class="container">

			<a class="navbar-brand" href="dashboard.html">

				Study<span>Nest</span>

			</a>

			<ul class="navbar-nav ms-auto d-flex flex-row gap-3">

				<li class="nav-item">

					<a class="nav-link" href="dashboard.html">

						Dashboard

					</a>

				</li>

				<li class="nav-item">

					<a class="nav-link" href="allstudents.html">

						Students

					</a>

				</li>

				<li class="nav-item">

					<a class="nav-link text-danger" href="#" onclick="logout()">

						Logout

					</a>

				</li>

			</ul>

		</div>

	</nav>

	<!-- ================= HERO ================= -->

	<section class="hero py-5">

		<div class="container">

			<h1 id="formTitle">

				Add
				<span>Student</span>

			</h1>

			<p>

				Create and manage student
				records efficiently.

			</p>

		</div>

	</section>

	<!-- ================= ALERT ================= -->

	<div id="messageBox"></div>

	<!-- ================= FORM ================= -->

	<section class="pb-5">

		<div class="container">

			<div class="row justify-content-center">

				<div class="col-lg-7">

					<div class="card-ui">

						<form id="studentForm" onsubmit="saveStudent(event)">

							<!-- NAME -->

							<div class="mb-3">

								<label class="form-label">

									Student Name

								</label>

								<input type="text" id="name" class="form-control" placeholder="Enter student name"
									required>

							</div>

							<!-- COURSE -->

							<div class="mb-3">

								<label class="form-label">

									Course

								</label>

								<input type="text" id="course" class="form-control" placeholder="Enter course" required>

							</div>

							<!-- EMAIL -->

							<div class="mb-3">

								<label class="form-label">

									Email Address

								</label>

								<input type="email" id="email" class="form-control" placeholder="Enter student email"
									required>

							</div>

							<!-- GENDER -->

							<div class="mb-4">

								<label class="form-label">

									Gender

								</label>

								<select id="gender" class="form-select">

									<option value="Male">

										Male

									</option>

									<option value="Female">

										Female

									</option>

									<option value="Other">

										Other

									</option>

								</select>

							</div>

							<!-- BUTTON -->

							<button id="submitBtn" class="btn btn-primary-custom w-100">

								Save Student

							</button>

						</form>

					</div>

				</div>

			</div>

		</div>

	</section>

	<!-- ================= FOOTER ================= -->

	<footer class="py-4 text-center text-muted">

		© 2026 StudyNest.
		All rights reserved.

	</footer>

	<!-- ================= SCRIPTS ================= -->

	<script src="js/api.js"></script>

	<script src="js/utils.js"></script>

	<script src="js/auth.js"></script>

	<script src="js/student.js"></script>

	<script>

		checkAuth();

		loadStudentForEdit();

	</script>

</body>

</html>
