<!doctype html>

<html lang="en">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>All Students | StudyNest</title>

	<!-- Bootstrap -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Bootstrap Icons -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<!-- Google Fonts -->

	<link
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
		rel="stylesheet">

	<!-- Custom CSS -->

	<link rel="stylesheet" href="css/style.css">

</head>

<body onload="loadStudents()">

	<!-- ================= NAVBAR ================= -->

	<nav class="navbar navbar-expand-lg">

		<div class="container">

			<a class="navbar-brand" href="dashboard.html">

				Study<span>Nest</span>

			</a>

			<ul class="navbar-nav ms-auto d-flex flex-row gap-3">

				<li class="nav-item">

					<a class="nav-link" href="dashboard.html">

						Dashboard

					</a>

				</li>

				<li class="nav-item">

					<a class="nav-link" href="addstudent.html">

						Add Student

					</a>

				</li>

				<li class="nav-item">

					<a class="nav-link text-danger" href="#" onclick="logout()">

						Logout

					</a>

				</li>

			</ul>

		</div>

	</nav>

	<!-- ================= HERO ================= -->

	<section class="hero py-5">

		<div class="container">

			<h1>

				All
				<span>Students</span>

			</h1>

			<p>

				Search, sort,
				and manage your students efficiently.

			</p>

		</div>

	</section>

	<!-- ================= ALERT ================= -->

	<div id="messageBox"></div>

	<!-- ================= SEARCH + SORT ================= -->

	<section class="pb-4">

		<div class="container">

			<div class="card-ui">

				<div class="row g-3 align-items-center">

					<!-- SEARCH -->

					<div class="col-lg-6">

						<input type="text" id="searchInput" class="form-control" placeholder="Search students by name">

					</div>

					<!-- SEARCH BUTTON -->

					<div class="col-lg-2">

						<button class="btn btn-primary-custom w-100" onclick="searchStudents()">

							Search

						</button>

					</div>

					<!-- SORT ASC -->

					<div class="col-lg-2">

						<button class="btn btn-outline-custom w-100" onclick="sortAsc()">

							A - Z

						</button>

					</div>

					<!-- SORT DESC -->

					<div class="col-lg-2">

						<button class="btn btn-outline-custom w-100" onclick="sortDesc()">

							Z - A

						</button>

					</div>

				</div>

			</div>

		</div>

	</section>

	<!-- ================= TABLE ================= -->

	<section class="pb-5">

		<div class="container">

			<div class="table-card table-responsive">

				<table class="table align-middle">

					<thead>

						<tr>

							<th>ID</th>

							<th>Name</th>

							<th>Course</th>

							<th>Email</th>

							<th>Gender</th>

							<th>Action</th>

						</tr>

					</thead>

					<tbody id="studentTable">

					</tbody>

				</table>

			</div>

		</div>

	</section>

	<!-- ================= FOOTER ================= -->

	<footer class="py-4 text-center text-muted">

		© 2026 StudyNest.
		All rights reserved.

	</footer>

	<!-- ================= SCRIPTS ================= -->

	<script src="js/api.js"></script>

	<script src="js/utils.js"></script>

	<script src="js/auth.js"></script>

	<script src="js/student.js"></script>

	<script>

		checkAuth();

	</script>

</body>

</html>
